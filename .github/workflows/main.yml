name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:         

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests --no-transfer-progress -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/metrics-dashboard.jar
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -Dspring.profiles.active=test --no-transfer-progress -B

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  docker-deploy:
    name: Docker Compose Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Write .env from your GitHub secrets so docker-compose picks them up
      - name: Create .env file
        run: |
          cat <<EOF > .env
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_PORT=${{ secrets.DATABASE_PORT }}
          APP_PORT=${{ secrets.APP_PORT }}
          DATABASE_URL=jdbc:postgresql://postgres:5432/${{ secrets.POSTGRES_DB }}
          DATABASE_USERNAME=${{ secrets.POSTGRES_USER }}
          DATABASE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          EOF

      - name: Build image with Docker Compose
        run: docker compose --env-file .env build

      - name: Tag image for GHCR
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}/metrics-dashboard
          IMAGE_ID=$(echo "$IMAGE_ID" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          docker tag metrics-dashboard-app:latest $IMAGE_ID:latest
          docker tag metrics-dashboard-app:latest $IMAGE_ID:sha-$SHORT_SHA
          docker tag metrics-dashboard-app:latest $IMAGE_ID:${{ github.ref_name }}

          echo "IMAGE_ID=$IMAGE_ID" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

      - name: Push image to GHCR
        run: |
          docker push $IMAGE_ID:latest
          docker push $IMAGE_ID:sha-$SHORT_SHA
          docker push $IMAGE_ID:${{ github.ref_name }}

      - name: Smoke test — start stack with Docker Compose
        run: |
          docker compose --env-file .env up -d
          echo "Waiting for app to be ready..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://localhost:${{ secrets.APP_PORT }}/dashboard)
          echo "Health check HTTP status: $STATUS"
          docker compose --env-file .env down
          if [ "$STATUS" != "200" ]; then
            echo "App did not respond with 200 — aborting"
            exit 1
          fi

      - name: Write deployment summary
        run: |
          echo "## Docker Compose Build & Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/${{ github.repository }}/metrics-dashboard:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`latest\`, \`sha-$SHORT_SHA\`, \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
