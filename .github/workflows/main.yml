name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: 
jobs:
 build:
  name: Build
  runs-on: ubuntu-latest
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: temurin
        cache: maven
    - name: Make mvnw executable
      run: chmod +x mvnw
    - name: Build with Maven
      run: ./mvnw clean package -DskipTests --no-transfer-progress -B
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/metrics-dashboard.jar
        retention-days: 1
 test:
  name: Test
  runs-on: ubuntu-latest
  needs: build
  services:
    postgres:
      image: postgres:16-alpine
      env:
       POSTGRES_DB:       ${{ secrets.POSTGRES_DB }}
       POSTGRES_USER:     ${{ secrets.POSTGRES_USER }}
       POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      ports:
       - ${{ secrets.DATABASE_PORT }}:5432
      options: >-
        --health-cmd "pg_isready -U ${{ secrets.POSTGRES_USER }}"
        --health-interval 10s
        --health-timeout 5s
        --health-retries 5


  steps:
    - name: Checkout code
      uses: actions/checkout@v4
 
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: "17"
        distribution: temurin
        ache: maven
 
    - name: Make mvnw executable
      run: chmod +x mvnw
 
    - name: Run tests
      run: ./mvnw test --no-transfer-progress -B
      env:
        DATABASE_URL:      jdbc:postgresql://localhost:${{ secrets.DATABASE_PORT }}/${{ secrets.POSTGRES_DB }}
        DATABASE_USERNAME: ${{ secrets.POSTGRES_USER }}
        DATABASE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
 
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: target/surefire-reports/
        retention-days: 7
  
