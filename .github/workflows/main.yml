name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.0

      - name: Set up JDK 17
        uses: actions/setup-java@v4.2.1
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests --no-transfer-progress -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4.3.0
        with:
          name: app-jar
          path: target/metrics-dashboard.jar
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.0

      - name: Set up JDK 17
        uses: actions/setup-java@v4.2.1
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -Dspring.profiles.active=test --no-transfer-progress -B

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4.3.0
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  docker-run:
    name: Docker Compose Run
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.0

      - name: Create .env file
        run: |
          cat <<EOF > .env
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_PORT=${{ secrets.DATABASE_PORT }}
          APP_PORT=${{ secrets.APP_PORT }}
          EOF

      - name: Run Docker Compose
        run: docker compose --env-file .env up --build -d

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app container to be healthy..."
          for i in {1..24}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' app 2>/dev/null || echo "unknown")
            echo "Attempt $i/24: $STATUS"
            [ "$STATUS" = "healthy" ] && echo "App is healthy!" && exit 0
            [ "$STATUS" = "unhealthy" ] && echo "App is unhealthy, dumping logs:" && docker compose logs && exit 1
            sleep 5
          done
          echo "Timed out waiting for app"
          docker compose logs
          exit 1

      - name: Test API
        run: curl --fail http://localhost:${{ secrets.APP_PORT }}/actuator/health

      - name: Stop containers
        if: always()
        run: docker compose down

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL
        run: ./mvnw clean compile -DskipTests --no-transfer-progress -B

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
