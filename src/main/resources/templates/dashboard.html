<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Metrics Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg:        #0a0c0f;
            --surface:   #111418;
            --border:    #1e2530;
            --border-hi: #2e3d52;
            --accent:    #00e5ff;
            --accent2:   #ff6b35;
            --ok:        #00ff88;
            --warn:      #ffd600;
            --crit:      #ff4444;
            --text:      #cdd6e0;
            --text-dim:  #5a6a7a;
            --mono:      'JetBrains Mono', monospace;
            --display:   'Syne', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,229,255,0.015) 2px,
                rgba(0,229,255,0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ── Header ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-family: var(--display);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
        }
        .logo span { color: var(--accent); }
        .header-meta {
            display: flex; align-items: center; gap: 24px;
        }
        .live-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .live-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--ok);
            box-shadow: 0 0 8px var(--ok);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity:1; transform: scale(1); }
            50%      { opacity:.5; transform: scale(0.8); }
        }
        #clock { font-size: 12px; color: var(--text-dim); letter-spacing: .5px; }

        /* ── Main layout ── */
        main { padding: 32px; max-width: 1400px; margin: 0 auto; }

        /* ── Stat cards ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: border-color .2s;
        }
        .stat-card::before {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--accent);
        }
        .stat-card:nth-child(2)::before { background: var(--accent2); }
        .stat-card:hover { border-color: var(--border-hi); }
        .stat-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; color: var(--text-dim);
            margin-bottom: 12px;
        }
        .stat-value {
            font-family: var(--display);
            font-size: 42px; font-weight: 800;
            line-height: 1;
            color: #fff;
        }
        .stat-value.accent  { color: var(--accent); }
        .stat-value.accent2 { color: var(--accent2); }
        .stat-unit { font-size: 16px; color: var(--text-dim); margin-left: 4px; }

        /* ── Section header ── */
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-title {
            font-family: var(--display);
            font-size: 14px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--text-dim);
        }

        /* ── Add button ── */
        #addBtn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .15s, color .15s, box-shadow .15s;
            position: relative; overflow: hidden;
        }
        #addBtn:hover {
            background: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 20px rgba(0,229,255,.3);
        }
        #addBtn:active { transform: scale(.98); }
        #addBtn .icon { font-size: 16px; line-height: 1; }
        #addBtn.loading { opacity: .6; pointer-events: none; }

        /* ── Table ── */
        .table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 10px; font-weight: 500;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--text-dim);
        }
        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background .1s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,.025); }
        tbody tr.new-row { animation: rowIn .4s ease forwards; }
        @keyframes rowIn {
            from { opacity: 0; background: rgba(0,229,255,.08); transform: translateX(-8px); }
            to   { opacity: 1; background: transparent; transform: translateX(0); }
        }
        td { padding: 12px 16px; vertical-align: middle; }
        .td-name { color: #fff; font-weight: 500; }
        .td-value { color: var(--accent); }
        .td-ts { color: var(--text-dim); font-size: 11px; }

        /* Status badge */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            font-size: 10px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            border-radius: 2px;
        }
        .badge-OK       { background: rgba(0,255,136,.12); color: var(--ok);   border: 1px solid rgba(0,255,136,.3); }
        .badge-WARNING  { background: rgba(255,214,0,.12);  color: var(--warn); border: 1px solid rgba(255,214,0,.3); }
        .badge-CRITICAL { background: rgba(255,68,68,.12);  color: var(--crit); border: 1px solid rgba(255,68,68,.3); }

        /* Empty state */
        .empty { padding: 60px; text-align: center; color: var(--text-dim); }
        .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: .4; }

        /* Auto-refresh toggle */
        .auto-refresh {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .toggle {
            width: 32px; height: 18px;
            background: var(--border);
            border-radius: 9px;
            position: relative; cursor: pointer;
            border: none;
            transition: background .2s;
        }
        .toggle::after {
            content: '';
            position: absolute; top: 3px; left: 3px;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--text-dim);
            transition: transform .2s, background .2s;
        }
        .toggle.on { background: rgba(0,229,255,.25); }
        .toggle.on::after { transform: translateX(14px); background: var(--accent); }

        /* Toast */
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--surface);
            border: 1px solid var(--border-hi);
            border-left: 3px solid var(--accent);
            padding: 12px 20px;
            font-size: 12px;
            opacity: 0; pointer-events: none;
            transform: translateY(8px);
            transition: opacity .2s, transform .2s;
            z-index: 1000;
        }
        #toast.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    </style>
</head>
<body>

<header>
    <div class="logo">METRIC<span>FLOW</span></div>
    <div class="header-meta">
        <div class="live-badge">
            <div class="live-dot"></div>
            <span>LIVE</span>
        </div>
        <div id="clock">--:--:--</div>
    </div>
</header>

<main>
    <!-- Stat Cards -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Total Metrics</div>
            <div class="stat-value accent" id="totalCount" th:text="${totalCount}">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Average Value</div>
            <div class="stat-value accent2" id="avgValue" th:text="${averageValue}">0<span class="stat-unit"></span></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Last Updated</div>
            <div class="stat-value" style="font-size:20px; padding-top:10px;" id="lastUpdated">—</div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="section-header">
        <div class="section-title">Recent Metrics</div>
        <div style="display:flex;align-items:center;gap:16px;">
            <div class="auto-refresh">
                <button class="toggle" id="autoToggle" title="Auto-refresh"></button>
                <span>Auto</span>
            </div>
            <button id="addBtn" onclick="addMetric()">
                <span class="icon">+</span> Add Sample Metric
            </button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Metric Name</th>
                    <th>Value</th>
                    <th>Status</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="metricsBody">
                <tr th:each="m, i : ${recentMetrics}">
                    <td class="td-ts" th:text="${i.index + 1}">1</td>
                    <td class="td-name" th:text="${m.name}">—</td>
                    <td class="td-value" th:text="${m.value}">—</td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${m.status}"
                              th:text="${m.status}">OK</span>
                    </td>
                    <td class="td-ts" th:text="${#temporals.format(m.timestamp, 'yyyy-MM-dd HH:mm:ss')}">—</td>
                </tr>
                <tr th:if="${#lists.isEmpty(recentMetrics)}">
                    <td colspan="5">
                        <div class="empty">
                            <div class="empty-icon">◎</div>
                            No metrics yet. Click "Add Sample Metric" to begin.
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div id="toast"></div>

<script>
    // Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent =
            now.toLocaleTimeString('en-US', { hour12: false });
        document.getElementById('lastUpdated').textContent =
            now.toLocaleTimeString('en-US', { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Toast
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Badge class helper
    function badgeClass(status) {
        return 'badge badge-' + status;
    }

    // Add metric
    async function addMetric() {
        const btn = document.getElementById('addBtn');
        btn.classList.add('loading');
        btn.textContent = 'Adding…';
        try {
            const res = await fetch('/api/metrics/add', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                document.getElementById('totalCount').textContent = data.totalCount;
                document.getElementById('avgValue').textContent = data.averageValue;
                prependRow(data.metric);
                showToast('✓ Metric added: ' + data.metric.name);
            }
        } catch (e) {
            showToast('✗ Failed to add metric');
        } finally {
            btn.classList.remove('loading');
            btn.innerHTML = '<span class="icon">+</span> Add Sample Metric';
        }
    }

    function prependRow(m) {
        const tbody = document.getElementById('metricsBody');
        // Remove empty state if present
        const emptyRow = tbody.querySelector('.empty');
        if (emptyRow) emptyRow.closest('tr').remove();

        const ts = new Date(m.timestamp).toLocaleString('sv-SE').replace('T', ' ');
        const tr = document.createElement('tr');
        tr.className = 'new-row';
        tr.innerHTML = `
            <td class="td-ts">—</td>
            <td class="td-name">${m.name}</td>
            <td class="td-value">${m.value}</td>
            <td><span class="${badgeClass(m.status)}">${m.status}</span></td>
            <td class="td-ts">${ts}</td>`;
        tbody.insertBefore(tr, tbody.firstChild);

        // Keep only 10 rows
        while (tbody.rows.length > 10) tbody.deleteRow(tbody.rows.length - 1);

        // Re-number
        [...tbody.rows].forEach((row, i) => { row.cells[0].textContent = i + 1; });
    }

    // Auto-refresh
    let autoInterval = null;
    const toggleBtn = document.getElementById('autoToggle');
    toggleBtn.addEventListener('click', () => {
        toggleBtn.classList.toggle('on');
        if (toggleBtn.classList.contains('on')) {
            autoInterval = setInterval(refreshTable, 5000);
            showToast('Auto-refresh ON (5s)');
        } else {
            clearInterval(autoInterval);
            showToast('Auto-refresh OFF');
        }
    });

    async function refreshTable() {
        try {
            const res = await fetch('/api/metrics');
            const metrics = await res.json();
            const tbody = document.getElementById('metricsBody');
            tbody.innerHTML = '';
            metrics.forEach((m, i) => {
                const ts = m.timestamp
                    ? m.timestamp.replace('T', ' ').substring(0, 19)
                    : '—';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="td-ts">${i + 1}</td>
                    <td class="td-name">${m.name}</td>
                    <td class="td-value">${m.value}</td>
                    <td><span class="${badgeClass(m.status)}">${m.status}</span></td>
                    <td class="td-ts">${ts}</td>`;
                tbody.appendChild(tr);
            });
        } catch (e) { /* silent */ }
    }
</script>
</body>
</html>
